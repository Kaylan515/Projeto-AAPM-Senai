<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AAPM{% endblock %}</title>
    <style>
        /* --- RESET E FONTES --- */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;600;700&display=swap');

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Montserrat', sans-serif; 
        }
        
        body { 
            background-color: #0b0205; 
            min-height: 100vh; 
            overflow-x: hidden; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
        }
        
        /* --- FUNDO PADRÃO --- */
        .background-canvas { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: -2; 
            background: url('/assets/fundo-abstrato.jpg') no-repeat center center; 
            background-size: cover; 
        }

        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: rgba(11, 2, 5, 0.45);
        }
        
        /* --- BARRA SUPERIOR (HEADER) --- */
        header { 
            background-color: #2c2c2c; 
            height: 65px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            position: relative; 
            padding: 0 30px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); 
            border-bottom: 3px solid #7d2ae8; 
            z-index: 10; 
        }
        
        .logo-container { 
            height: 170px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        
        .logo-container img { 
            height: 100%; 
            object-fit: contain; 
        }

        /* --- CONTAINER DO AVATAR --- */
        .avatar-container { 
            position: absolute; 
            right: 35px; 
            width: 48px; 
            height: 49px; 
            border-radius: 50%; 
            border: 2px solid #d39b21; 
            cursor: pointer; 
        }
        
        .avatar-container img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            object-position: top center; 
            border-radius: 50%; 
        }

        /* --- DROPDOWN --- */
        .user-dropdown { 
            position: absolute; 
            top: 55px; 
            right: 0; 
            width: 220px; 
            background-color: #140409; 
            border: 1px solid #d39b21; 
            border-radius: 12px; 
            padding: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.6); 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            opacity: 0; 
            visibility: hidden; 
            transform: translateY(-10px); 
            transition: all 0.3s ease; 
            z-index: 999; 
        }
        
        .avatar-container:hover .user-dropdown { 
            opacity: 1; 
            visibility: visible; 
            transform: translateY(0); 
        }
        
        .dropdown-header { 
            display: flex; 
            flex-direction: column; 
            color: #ffffff; 
            font-size: 13px; 
            text-align: left; 
        }
        
        .dropdown-header span { 
            font-size: 11px; 
            color: rgba(255, 255, 255, 0.6); 
            margin-top: 2px; 
        }
        
        .user-dropdown hr { 
            border: 0; 
            border-top: 1px solid rgba(255, 255, 255, 0.15); 
            margin: 4px 0; 
        }
        
        .dropdown-item { 
            color: #ffffff; 
            text-decoration: none; 
            font-size: 14px; 
            font-weight: 600; 
            padding: 8px 10px; 
            border-radius: 6px; 
            transition: background 0.2s, color 0.2s; 
            text-align: left; 
            display: block; 
        }
        
        .dropdown-item:hover { 
            background-color: rgba(211, 155, 33, 0.2); 
            color: #e4be6b; 
        }
        
        .dropdown-item.logout { 
            color: #ff4d6d; 
        }
        
        .dropdown-item.logout:hover { 
            background-color: rgba(255, 77, 109, 0.15); 
        }

        /* --- WRAPPER PRINCIPAL --- */
        .wrapper { 
            flex: 1; 
            padding: 25px 50px; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
        }
        
        /* Espaço reservado para estilos específicos de cada página */
        {% block extra_styles %}{% endblock %}
    </style>
</head>
<body>

    <div class="background-canvas"></div>
    <div class="background-overlay"></div>

    <header>
        <div class="logo-container">
            <img src="/assets/Logo AAPM.svg" alt="Logo AAPM">
        </div>
        
        {% if usuario_logado is defined and usuario_logado %}
        <div class="avatar-container">
            <img src="https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?auto=format&fit=crop&w=150&q=80" alt="Profile">
            <div class="user-dropdown">
                <div class="dropdown-header">
                    <strong>{{ usuario_logado.nome }}</strong>
                    <span>Perfil: {{ usuario_logado.role }}</span> 
                </div>
                <hr>
                <a href="/logout" class="dropdown-item logout">Deslogar</a>
            </div>
        </div>
        {% endif %}
    </header>

    <div class="wrapper">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
