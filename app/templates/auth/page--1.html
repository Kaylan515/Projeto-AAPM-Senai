<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AAPM – SENAI Brás-SP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --burgundy:   #6B1E2E;
      --copper:     #A0522D;
      --copper-lt:  #C47B45;
      --charcoal:   #1A1A1A;
      --smoke:      #2C2C2C;
      --silver:     #9BA0A8;
      --cream:      #F0EAE0;
      --glass-bg:   rgba(20, 15, 15, 0.55);
      --glass-border: rgba(160, 82, 45, 0.35);
    }
 
    html, body {
      width: 100%; height: 100%;
      background: var(--charcoal);
      font-family: 'Josefin Sans', sans-serif;
      overflow-x: hidden;
    }
 
    /* ── HERO ── */
    .hero {
      position: relative;
      width: 100vw; height: 100vh;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
 
    /* real background image */
    .hero__bg {
      position: absolute; inset: 0;
      background-image: url('/static/assets/fundo-abstrato.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 0;
    }
 
    /* dark overlay so text stays readable */
    .hero__overlay {
      position: absolute; inset: 0;
      background: linear-gradient(
        120deg,
        rgba(10, 4, 4, 0.55) 0%,
        rgba(20, 8, 8, 0.35) 50%,
        rgba(10, 4, 4, 0.45) 100%
      );
      z-index: 1;
    }
 
    /* subtle noise grain */
    .hero__grain {
      position: absolute; inset: 0; z-index: 2;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
      background-size: 180px 180px;
      pointer-events: none;
    }
 
    /* ── TOPBAR ── */
    .topbar {
      position: relative; z-index: 10;
      display: flex; justify-content: space-between; align-items: center;
      padding: 18px 40px;
      border-bottom: 1px solid rgba(160, 82, 45, 0.18);
      background: rgba(10, 5, 5, 0.45);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      animation: fadeDown 0.7s ease both;
    }
    .topbar__left, .topbar__right {
      font-family: 'Josefin Sans', sans-serif;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--silver);
    }
    .topbar__divider { color: var(--copper); margin: 0 8px; }
 
    /* ── CONTENT ── */
    .hero__content {
      position: relative; z-index: 10;
      display: flex; flex-direction: column;
      justify-content: center;
      flex: 1;
      padding: 0 56px 40px;
    }
 /* ── LOGO 100% INDEPENDENTE E FIXA ── */
  .logo {
    position: fixed; /* ISSO DOUTORINA A LOGO: ela ignora o flexbox e foca na tela */
    top: 10px;       /* Distância do topo da tela */
    left: 600px;      /* Distância da esquerda da tela */
    z-index: 999;    /* Fica por cima de absolutamente tudo */
    width: 300px; 
    height: 90px;
    pointer-events: none; 
    animation: fadeIn 1s 0.3s ease both;
  }

  .logo img {
    width: 100%; 
    height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 4px 24px rgba(160,82,45,0.5));
  }

    .headline h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 4.2vw, 3.6rem);
      font-weight: 600;
      line-height: 1.18;
      color: #F5EDE5;
      text-shadow: 0 2px 32px rgba(0,0,0,0.7);
      letter-spacing: 0.01em;
    }
    .headline p {
      margin-top: 14px;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--silver);
    }
 
    .actions {
  position: absolute;
  bottom: 56px; right: 48px;
  display: flex; flex-direction: column; gap: 12px;
  animation: fadeUp 0.9s 0.8s ease both;
  z-index: 25; /* Garante que o botão seja clicável */
}
    
 
    .btn {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 22px;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      font-family: 'Josefin Sans', sans-serif;
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      border: none; outline: none;
    }
    .btn:hover { transform: translateY(-2px); }
 
    .btn--primary {
      background: var(--glass-bg);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--glass-border);
      color: var(--cream);
      box-shadow: 0 4px 24px rgba(0,0,0,0.45);
    }
    .btn--primary:hover {
      background: rgba(107, 30, 46, 0.55);
      box-shadow: 0 8px 32px rgba(107,30,46,0.4);
    }
 
    .btn--secondary {
      background: rgba(25, 18, 18, 0.4);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(155, 160, 168, 0.2);
      color: var(--silver);
    }
    .btn--secondary:hover {
      background: rgba(40, 30, 30, 0.6);
      color: var(--cream);
    }
 
    .btn__avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--burgundy), var(--copper));
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      box-shadow: 0 0 0 2px rgba(160,82,45,0.4);
    }
 
    /* sparkle decoration */
    .sparkle {
      position: absolute; bottom: 20px; right: 20px;
      z-index: 20;
      animation: pulse 3s infinite ease-in-out;
    }
    .sparkle svg { width: 28px; height: 28px; }
 
    /* decorative icons */
    .deco-icons {
      position: absolute; inset: 0; z-index: 3;
      pointer-events: none;
    }
    .deco-icons span {
      position: absolute;
      color: rgba(160,82,45,0.18);
      font-size: 20px;
      animation: floatDeco 8s infinite ease-in-out;
    }
 
    /* ── ANIMATIONS ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: scale(1) rotate(0deg); }
      50%       { opacity: 1;   transform: scale(1.15) rotate(15deg); }
    }
    @keyframes floatDeco {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50%       { transform: translateY(-8px) rotate(8deg); }
    }
    @keyframes shimmer {
      0%   { filter: drop-shadow(0 0 6px rgba(160,82,45,0.4)); }
      50%  { filter: drop-shadow(0 0 18px rgba(160,82,45,0.9)); }
      100% { filter: drop-shadow(0 0 6px rgba(160,82,45,0.4)); }
    }
    .logo img { animation: shimmer 4s infinite ease-in-out; }
  </style>
</head>
<body>
 
<section class="hero">
 
  <!-- real background image -->
  <div class="hero__bg"></div>
  <!-- dark overlay -->
  <div class="hero__overlay"></div>
 
  <!-- grain overlay -->
  <div class="hero__grain"></div>
 
  <!-- decorative background icons -->
  <div class="deco-icons">
    <span style="left:3%;top:28%;animation-delay:0s">✦</span>
    <span style="left:5%;top:55%;font-size:26px;animation-delay:1s">⊞</span>
    <span style="left:7%;top:75%;animation-delay:2s">⊙</span>
    <span style="left:9%;top:42%;animation-delay:0.5s">⚙</span>
    <span style="left:12%;top:85%;animation-delay:1.5s">◉</span>
    <span style="right:3%;top:25%;animation-delay:0.8s">✦</span>
    <span style="right:5%;top:55%;animation-delay:2s">⊞</span>
    <span style="right:8%;top:70%;animation-delay:1.2s">◎</span>
  </div>
 
  <!-- topbar -->
  <header class="topbar">
    <span class="topbar__left">AAPM – SENAI Brás-SP</span>
    <span class="topbar__right">
      Rua Correia de Andrade, 232
      <span class="topbar__divider">|</span>
      Têxtil e Moda
    </span>
  </header>
 
  <!-- AAPM Logo -->
  <div class="logo">
    <img src="/static/assets/Logo AAPM.svg" alt="Logo AAPM" />
  </div>
 
  <!-- main content -->
  <div class="hero__content">
    <div class="headline">
      <h1>
        Descubra a inovação em sua gestão.<br>
        Gerenciamento inteligente de estoque<br>
        com a AAPM SENAI Brás-SP.
      </h1>
      <p>Soluções avançadas para o setor têxtil.</p>
    </div>
  </div>
 
<div class="actions">
  <a href="/login" class="btn btn--primary">
    <span class="btn__avatar">L</span>
    Acesso Administrativo
  </a>
  
  <a href="/visualizacao" class="btn btn--secondary">
    Visão Geral do Sistema
  </a>
</div>
 
  <!-- sparkle decoration -->
  <div class="sparkle">
    <svg viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg">
      <path d="M14 0 L15.5 12.5 L28 14 L15.5 15.5 L14 28 L12.5 15.5 L0 14 L12.5 12.5 Z"
            fill="#C47B45" opacity="0.85"/>
    </svg>
  </div>
 
</section>
 
<script>
  // Animate decorative icons with staggered delays on load
  document.querySelectorAll('.deco-icons span').forEach((el, i) => {
    el.style.animationDelay = (i * 0.4) + 's';
  });
 
  // Button ripple effect
  document.querySelectorAll('.btn').forEach(btn => {
    btn.addEventListener('click', function(e) {
      const rect = btn.getBoundingClientRect();
      const ripple = document.createElement('span');
      const size = Math.max(rect.width, rect.height);
      ripple.style.cssText = `
        position:absolute; border-radius:50%;
        width:${size}px; height:${size}px;
        left:${e.clientX - rect.left - size/2}px;
        top:${e.clientY - rect.top - size/2}px;
        background:rgba(160,82,45,0.25);
        transform:scale(0); animation:rippleAnim 0.5s ease-out forwards;
        pointer-events:none;
      `;
      btn.style.position = 'relative';
      btn.style.overflow = 'hidden';
      btn.appendChild(ripple);
      setTimeout(() => ripple.remove(), 600);
    });
  });
 
  // inject ripple keyframe
  const style = document.createElement('style');
  style.textContent = `@keyframes rippleAnim {
    to { transform: scale(2.5); opacity: 0; }
  }`;
  document.head.appendChild(style);
</script>
</body>
</html>
