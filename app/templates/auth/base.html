<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - AAPM</title>
    <style>
        /* --- RESET E FONTES --- */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: #0b0205;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* --- FUNDO ABSTRATO COMPLETO --- */
        .background-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: url('/static/assets/fundo-abstrato.jpg') no-repeat center center;
            background-size: cover;
        }

        /* --- BARRA SUPERIOR FIXA --- */
        header {
            background-color: #2c2c2c;
            min-height: 90px;
            height: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 18px 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            border-bottom: 3px solid #a58d4c;
            z-index: 10;
        }

        .logo-container {
            height: auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-container img {
            height: 56px;
            object-fit: contain;
        }

        /* --- AVATAR E DROPDOWN --- */
        .avatar-container {
            position: absolute;
            right: 35px;
            width: 48px;
            height: 49px;
            border-radius: 50%;
            border: 2px solid #d39b21;
            cursor: pointer;
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center;
            border-radius: 50%;
        }

        .user-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            width: 220px;
            background-color: #140409; 
            border: 1px solid #d39b21;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            gap: 8px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            z-index: 999;
        }

        .avatar-container:hover .user-dropdown {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        /* --- WRAPPER CENTRALIZADO --- */
        .wrapper {
            flex: 1;
            padding: 25px 50px;
            display: flex;
            flex-direction: column;
            position: relative;
            align-items: center;
        }

        .title-container {
            width: 100%;
            text-align: center;
            margin-top: -10px;
            margin-bottom: 20px;
        }

        .title-main .painel {
            font-family: 'Cinzel', serif;
            color: #ffffff;
            font-weight: 700;
            font-style: italic;
            font-size: 26px;
        }

        .title-main .adm {
            color: #cfb065;
            font-weight: 400;
            text-transform: uppercase;
            font-size: 26px;
            margin-left: 5px;
        }

        /* --- CONTAINER ONDE ENTRARÃO AS TELAS --- */
        #dynamicContent {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- BOTÃO ORIGINAL SAIR NO FUNDO --- */
        .btn-sair-fundo {
            position: absolute;
            bottom: 70px;
            left: 20px;
            color: #000000;
            font-weight: 700;
            text-decoration: none;
            font-size: 16px;
        }

        /* --- MENU GAVETA DESLIZANTE --- */
        .sidebar-menu {
            position: absolute;
            top: 90px;
            left: 0;
            width: 215px;
            height: calc(100vh - 90px);
            background-color: #313131;
            border-top-right-radius: 45px;
            border-bottom-right-radius: 45px;
            padding: 35px 20px 30px 22px;
            display: flex;
            flex-direction: column;
            box-shadow: 10px 0 30px rgba(0,0,0,0.7);
            border-right: 3px solid #000000;
            transform: translateX(-105%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 100;
        }

        .sidebar-menu.active {
            transform: translateX(0);
        }

        .menu-title {
            color: #8c7657;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 25px;
        }

        .menu-items-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex: 1;
        }

        .menu-item {
            color: #ffffff;
            text-decoration: none;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            line-height: 1.2;
            transition: color 0.2s;
        }

        .menu-item:hover, .menu-item.active-page {
            color: #e4be6b;
        }

        .menu-item.sair {
            color: #000000;
            font-size: 18px;
            margin-top: auto;
            padding-bottom: 15px;
        }

        /* --- ABA GATILHO "DASHBOARD" NO RODAPÉ --- */
        .dashboard-trigger {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 200px;
            height: 48px;
            background: linear-gradient(to bottom, #444, #333);
            border-top-right-radius: 18px;
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            padding-left: 20px;
            gap: 12px;
            cursor: pointer;
            z-index: 99;
        }

        .icon-dashboard {
            width: 22px;
            height: 22px;
            stroke: #746e61;
            fill: none;
            stroke-width: 1.5;
        }

        .dashboard-trigger span {
            color: #e4be6b;
            font-weight: 700;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="background-canvas"></div>

    <header>
        <div class="logo-container">
            <img src="/static/assets/Logo AAPM.svg" alt="Logo AAPM">
        </div>
        <div class="avatar-container">
            <img src="https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?auto=format&fit=crop&w=150&q=80" alt="Profile">
            <div class="user-dropdown">
                <div class="dropdown-header">
                    <strong>Nome do Usuário</strong>
                    <span>admin@aapm.com</span>
                </div>
                <hr>
                <a href="#" class="dropdown-item">Visualizar Conta</a>
                <a href="#" class="dropdown-item">Deslogar</a>
            </div>
        </div>
    </header>

    <div class="wrapper">
        <div class="title-container">
            <h1 class="title-main"><span class="painel">PAINEL</span> <span class="adm">ADMINISTRATIVO</span></h1>
        </div>

        <div id="dynamicContent"></div>

        <a href="#" class="btn-sair-fundo">Sair</a>

        <div class="sidebar-menu" id="sidebarMenu">
            <div class="menu-title">DASHBOARD</div>
            
            <div class="menu-items-container">
                <a href="dashboard.html" class="menu-item" id="nav-inicio" onclick="navigateMenu(event)">Início</a>
                <a href="visao_geral.html" class="menu-item" id="nav-visao" onclick="navigateMenu(event)">Visão Geral</a>
                <a href="minha_loja.html" class="menu-item" id="nav-loja" onclick="navigateMenu(event)">Minha loja</a>
                <div class="menu-item" onclick="closeMenu()">Produtos</div>
                <div class="menu-item" onclick="closeMenu()">Receitas</div>
                <div class="menu-item" onclick="closeMenu()">Fornecedores</div>
                <div class="menu-item" onclick="closeMenu()">Vendas</div>
            </div>
            
            <div class="menu-item sair" onclick="closeMenu()">Sair</div>
        </div>

        <div class="dashboard-trigger" id="dashboardBtn">
            <svg class="icon-dashboard" viewBox="0 0 24 24">
                <rect x="2" y="4" width="20" height="16" rx="2" stroke-width="2"/>
                <line x1="2" y1="8" x2="22" y2="8" stroke-width="2"/>
                <circle cx="10" cy="14" r="3" />
                <line x1="12.5" y1="16.5" x2="16" y2="20" stroke-width="2"/>
            </svg>
            <span>Dashboard</span>
        </div>
    </div>

    <script>
        const dashboardBtn = document.getElementById('dashboardBtn');
        const sidebarMenu = document.getElementById('sidebarMenu');

        dashboardBtn.addEventListener('click', (e) => {
            sidebarMenu.classList.toggle('active');
            e.stopPropagation();
        });

        function closeMenu() {
            sidebarMenu.classList.remove('active');
        }

        function navigateMenu(event) {
            event.preventDefault();
            const targetUrl = event.currentTarget.getAttribute('href');
            sidebarMenu.classList.remove('active');
            setTimeout(() => {
                window.location.href = targetUrl;
            }, 300);
        }

        document.addEventListener('click', (e) => {
            if (!sidebarMenu.contains(e.target) && e.target !== dashboardBtn) {
                sidebarMenu.classList.remove('active');
            }
        });

        // Script inteligente para marcar qual link do menu está ativo com base no nome do arquivo atual
        document.addEventListener("DOMContentLoaded", () => {
            const path = window.location.pathname;
            const page = path.split("/").pop();
            
            if (page === "dashboard.html" || page === "") {
                document.getElementById("nav-inicio").classList.add("active-page");
            } else if (page === "visao_geral.html") {
                document.getElementById("nav-visao").classList.add("active-page");
            } else if (page === "minha_loja.html") {
                document.getElementById("nav-loja").classList.add("active-page");
            }
        });
    </script>
</body>
</html>
