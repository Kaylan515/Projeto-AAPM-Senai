<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Produtos</title>
    <style>
        /* --- RESET E FONTES --- */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght=700&family=Montserrat:wght=400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: #0b0205;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* --- FUNDO CONFIGURADO --- */
        .background-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: url('/static/assets/fundo-abstrato.jpg') no-repeat center center;
            background-size: cover;
        }

        /* --- BARRA SUPERIOR REFEITA PARA A LOGO --- */
        header {
            background-color: #2c2c2c;
            height: 65px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 0 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            border-bottom: 3px solid #a58d4c;
            z-index: 10;
        }

        .logo-container {
            height: 170px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-container img {
            height: 100%;
            object-fit: contain;
        }

        /* --- CONTAINER DO AVATAR COM MENU SUSPENSO --- */
        .avatar-container {
            position: absolute;
            right: 35px;
            width: 48px;
            height: 49px;
            border-radius: 50%;
            border: 2px solid #d39b21;
            cursor: pointer;
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .user-dropdown {
            position: absolute;
            top: 55px;
            right: 0;
            width: 220px;
            background-color: #140409; 
            border: 1px solid #d39b21;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            gap: 8px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            z-index: 999;
        }

        .avatar-container:hover .user-dropdown {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-header {
            display: flex;
            flex-direction: column;
            color: #ffffff;
            font-size: 13px;
        }

        .user-dropdown hr {
            border: 0;
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            margin: 4px 0;
        }

        .dropdown-item {
            color: #ffffff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            padding: 8px 10px;
            border-radius: 6px;
            transition: background 0.2s, color 0.2s;
        }

        .dropdown-item:hover {
            background-color: rgba(211, 155, 33, 0.2);
            color: #e4be6b;
        }

        /* --- CONTEÚDO PRINCIPAL --- */
        .wrapper {
            flex: 1;
            padding: 25px 50px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .breadcrumb {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 5px;
        }

        .breadcrumb span {
            color: rgba(255, 255, 255, 0.85);
            font-weight: 600;
        }

        .title-container {
            width: 100%;
            text-align: center;
            margin-top: -10px;
            margin-bottom: 20px;
        }

        .title-main .painel {
            font-family: 'Cinzel', serif;
            color: #ffffff;
            font-weight: 700;
            font-style: italic;
            font-size: 26px;
        }

        .title-main .adm {
            color: #cfb065;
            font-weight: 400;
            text-transform: uppercase;
            font-size: 26px;
            margin-left: 5px;
        }

        /* --- PALCO CENTRAL CONFIGURADO PARA GERENCIAMENTO DE PRODUTOS --- */
        .center-stage {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-bottom: 40px;
        }

        .produtos-container {
            width: 950px;
            height: 480px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Bloco superior de Formulário Rápido */
        .form-card {
            background-color: #080506;
            border-radius: 18px;
            padding: 15px 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.02);
        }

        .form-card h3 {
            font-size: 12px;
            color: #cfb065;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .product-form {
            display: flex;
            gap: 15px;
            align-items: flex-end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex: 1;
        }

        .form-group.small {
            flex: 0.5;
        }

        .form-group label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
        }

        .form-group input, .form-group select {
            background-color: #140c0e;
            border: 1px solid rgba(211, 155, 33, 0.3);
            border-radius: 8px;
            padding: 8px 12px;
            color: #ffffff;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: #cfb065;
        }

        .btn-salvar {
            background: linear-gradient(135deg, #a58d4c 0%, #cfb065 100%);
            border: none;
            border-radius: 8px;
            padding: 9px 25px;
            color: #0b0205;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-salvar:hover {
            opacity: 0.9;
        }

        /* Bloco Inferior com a Tabela de Listagem */
        .table-card {
            flex: 1;
            background: radial-gradient(circle at bottom right, #20070e 0%, #080506 80%);
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255,255,255,0.02);
            overflow-y: auto;
        }

        .product-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        .product-table th {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .product-table td {
            padding: 12px 10px;
            color: #ffffff;
            font-size: 13px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }

        .product-table tr:hover td {
            background-color: rgba(255, 255, 255, 0.01);
        }

        .text-gold {
            color: #cfb065;
            font-weight: 600;
        }

        /* Ações na Tabela */
        .actions-cell {
            display: flex;
            gap: 10px;
        }

        .btn-action {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .btn-action.edit {
            color: #e4be6b;
        }

        .btn-action.edit:hover {
            background-color: rgba(228, 190, 107, 0.15);
        }

        .btn-action.delete {
            color: #ff4d6d;
        }

        .btn-action.delete:hover {
            background-color: rgba(255, 77, 109, 0.15);
        }

        /* --- ABA INFERIOR DO DASHBOARD (GATILHO) --- */
        .dashboard-trigger {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 200px;
            height: 48px;
            background: linear-gradient(to bottom, #444, #333);
            border-top-right-radius: 18px;
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            padding-left: 20px;
            gap: 12px;
            cursor: pointer;
            z-index: 99;
        }

        .icon-dashboard {
            width: 22px;
            height: 22px;
            stroke: #746e61;
            fill: none;
            stroke-width: 1.5;
        }

        .dashboard-trigger span {
            color: #e4be6b;
            font-weight: 700;
            font-size: 16px;
        }

        /* --- MENU COMPLETO QUE SOBE ATÉ O TOPO --- */
        .sidebar-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 215px;
            height: calc(100vh - 65px);
            background-color: #313131;
            border-top-right-radius: 45px;
            border-bottom-right-radius: 45px;
            padding: 35px 20px 30px 22px;
            display: flex;
            flex-direction: column;
            box-shadow: 10px 0 30px rgba(0,0,0,0.7);
            border-right: 3px solid #000000;
            transform: translateY(105%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 100;
        }

        .sidebar-menu.active {
            transform: translateY(0);
        }

        .menu-title {
            color: #8c7657;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 25px;
        }

        .menu-items-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex: 1;
        }

        .menu-item {
            color: #ffffff;
            text-decoration: none;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            line-height: 1.2;
            transition: color 0.2s;
        }

        .menu-item:hover, .menu-item.active-page {
            color: #e4be6b;
        }

        .menu-item.sair {
            color: #000000;
            font-size: 18px;
            margin-top: auto;
            padding-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="background-canvas"></div>

    <header>
        <div class="logo-container">
            <img src="/static/assets/Logo AAPM.svg" alt="Logo AAPM">
        </div>
        <div class="avatar-container">
            <img src="https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?auto=format&fit=crop&w=150&q=80" alt="Profile">
            <div class="user-dropdown">
                <div class="dropdown-header">
                    <strong>Nome do Usuário</strong>
                    <span>admin@aapm.com</span>
                </div>
                <hr>
                <a href="#" class="dropdown-item">Visualizar Conta</a>
                <a href="#" class="dropdown-item">Deslogar</a>
            </div>
        </div>
    </header>

    <div class="wrapper">
        <div class="breadcrumb">Inicio &gt; <span>Produtos</span></div>
        
        <div class="title-container">
            <h1 class="title-main"><span class="painel">GERENCIAR</span> <span class="adm">PRODUTOS</span></h1>
        </div>

        <div class="center-stage">
            <div class="produtos-container">
                
                <div class="form-card">
                    <h3 id="formTitle">Adicionar Novo Produto</h3>
                    <form class="product-form" id="productForm" onsubmit="handleFormSubmit(event)">
                        <input type="hidden" id="productId">
                        
                        <div class="form-group">
                            <label for="prodNome">Nome do Produto</label>
                            <input type="text" id="prodNome" placeholder="Ex: Camisa" required>
                        </div>
                        
                        <div class="form-group small">
                            <label for="prodPreco">Preço (R$)</label>
                            <input type="number" id="prodPreco" step="0.01" placeholder="0.00" required>
                        </div>

                        <div class="form-group small">
                            <label for="prodEstoque">Estoque</label>
                            <input type="number" id="prodEstoque" placeholder="0" required>
                        </div>

                        <div class="form-group">
                            <label for="prodCategoria">Categoria</label>
                            <select id="prodCategoria" required>
                                <option value="Roupas">Roupas</option>
                                <option value="Itens">Itens</option>
                                <option value="Materiais">Materiais</option>
                            </select>
                        </div>
                        
                        <button type="submit" class="btn-salvar" id="btnSubmit">Adicionar</button>
                    </form>
                </div>

                <div class="table-card">
                    <table class="product-table">
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Categoria</th>
                                <th>Preço</th>
                                <th>Estoque</th>
                                <th style="width: 120px;">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="productTableBody">
                            </tbody>
                    </table>
                </div>

            </div>
        </div>

        <div class="menu-items-container">
            <a href="/dashboard" class="menu-item">Inicio</a>
            <a href="/visualizacao" class="menu-item">Visão Geral</a>
            <a href="/minha_loja" class="menu-item">Minha loja</a>
            <a href="/produtos" class="menu-item">Produtos</a>
        </div>
                <div class="menu-item" onclick="closeMenu()">Receitas</div>
                <div class="menu-item" onclick="closeMenu()">Fornecedores</div>
                <div class="menu-item" onclick="closeMenu()">Vendas</div>
            </div>
            <div class="menu-item sair" onclick="closeMenu()">Sair</div>
        </div>

        <div class="dashboard-trigger" id="dashboardBtn">
            <svg class="icon-dashboard" viewBox="0 0 24 24">
                <rect x="2" y="4" width="20" height="16" rx="2" stroke-width="2"/>
                <line x1="2" y1="8" x2="22" y2="8" stroke-width="2"/>
                <circle cx="10" cy="14" r="3" />
                <line x1="12.5" y1="16.5" x2="16" y2="20" stroke-width="2"/>
            </svg>
            <span>Dashboard</span>
        </div>
    </div>

    <script>
        // --- SCRIPT DE CONTROLE DO MENU ---
        const dashboardBtn = document.getElementById('dashboardBtn');
        const sidebarMenu = document.getElementById('sidebarMenu');

        dashboardBtn.addEventListener('click', (e) => {
            sidebarMenu.classList.toggle('active');
            e.stopPropagation();
        });

        function closeMenu() { sidebarMenu.classList.remove('active'); }

        function navigateMenu(event) {
            event.preventDefault();
            const targetUrl = event.currentTarget.getAttribute('href');
            sidebarMenu.classList.remove('active');
            setTimeout(() => { window.location.href = targetUrl; }, 300);
        }

        document.addEventListener('click', (e) => {
            if (!sidebarMenu.contains(e.target) && e.target !== dashboardBtn) {
                sidebarMenu.classList.remove('active');
            }
        });

        // --- LÓGICA DE GERENCIAMENTO DE PRODUTOS (CRUD EM MEMÓRIA) ---
        // Mock de dados iniciais para a tabela
        let produtos = [
            { id: 1, nome: "Camiseta SENAI", preco: 45.00, estoque: 24, categoria: "Roupas" },
            { id: 2, nome: "Jaleco", preco: 22.50, estoque: 15, categoria: "Roupas" }
        ];

        const tableBody = document.getElementById('productTableBody');
        const form = document.getElementById('productForm');
        const formTitle = document.getElementById('formTitle');
        const btnSubmit = document.getElementById('btnSubmit');

        function renderProducts() {
            tableBody.innerHTML = '';
            produtos.forEach(p => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${p.nome}</td>
                    <td>${p.categoria}</td>
                    <td class="text-gold">R$ ${p.preco.toFixed(2)}</td>
                    <td>${p.estoque} un</td>
                    <td class="actions-cell">
                        <button class="btn-action edit" onclick="editProduct(${p.id})">Editar</button>
                        <button class="btn-action delete" onclick="deleteProduct(${p.id})">Excluir</button>
                    </td>
                `;
                tableBody.appendChild(tr);
            });
        }

        function handleFormSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('productId').value;
            const nome = document.getElementById('prodNome').value;
            const preco = parseFloat(document.getElementById('prodPreco').value);
            const estoque = parseInt(document.getElementById('prodEstoque').value);
            const categoria = document.getElementById('prodCategoria').value;

            if (id) {
                // Modo Atualizar
                produtos = produtos.map(p => p.id == id ? { id: parseInt(id), nome, preco, estoque, categoria } : p);
            } else {
                // Modo Adicionar
                const newId = produtos.length > 0 ? Math.max(...produtos.map(p => p.id)) + 1 : 1;
                produtos.push({ id: newId, nome, preco, estoque, categoria });
            }

            resetForm();
            renderProducts();
        }

        function editProduct(id) {
            const p = produtos.find(prod => prod.id === id);
            if (p) {
                document.getElementById('productId').value = p.id;
                document.getElementById('prodNome').value = p.nome;
                document.getElementById('prodPreco').value = p.preco;
                document.getElementById('prodEstoque').value = p.estoque;
                document.getElementById('prodCategoria').value = p.categoria;

                formTitle.innerText = "Atualizar Produto";
                btnSubmit.innerText = "Atualizar";
            }
        }

        function deleteProduct(id) {
            if (confirm("Deseja realmente remover este produto?")) {
                produtos = produtos.filter(p => p.id !== id);
                renderProducts();
                resetForm();
            }
        }

        function resetForm() {
            form.reset();
            document.getElementById('productId').value = '';
            formTitle.innerText = "Adicionar Novo Produto";
            btnSubmit.innerText = "Adicionar";
        }

        // Renderização inicial
        renderProducts();
    </script>
</body>
</html>
